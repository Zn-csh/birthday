<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - 张楠 & 蔡思晗</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #fefcf9; color: #333; }
.container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

.card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 16px; }

label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 4px; }
input, textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; font-family: inherit; transition: border 0.2s; }
input:focus, textarea:focus { border-color: #f43e5e; }
textarea { resize: vertical; min-height: 80px; }

.btn { display: inline-block; padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, #e11d48, #f43e5e); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-outline { background: #fff; color: #666; border: 1.5px solid #ddd; }
.btn-outline:hover { background: #f5f5f5; }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn:disabled { opacity: 0.5; pointer-events: none; }

.form-group { margin-bottom: 14px; }
.form-row { display: flex; gap: 14px; }
.form-row > * { flex: 1; }

h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
h2 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.subtitle { font-size: 13px; color: #999; margin-bottom: 18px; }
.hint { font-size: 12px; color: #aaa; margin-top: 6px; }

.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 10px; font-size: 14px; z-index: 999; color: #fff; animation: fadeIn 0.3s ease; }
.toast-ok { background: #059669; }
.toast-err { background: #dc2626; }
.toast-info { background: #1e40af; }
@keyframes fadeIn { from{opacity:0;transform:translateY(16px) translateX(-50%);} to{opacity:1;transform:translateY(0) translateX(-50%);} }

.status-bar { display: flex; align-items: center; gap: 10px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-dot.idle { background: #d1d5db; }
.status-dot.busy { background: #f59e0b; animation: blink 1s infinite; }
.status-dot.ok { background: #10b981; }
.status-dot.err { background: #ef4444; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

.progress-bar { height: 4px; background: #eee; border-radius: 2px; margin-top: 12px; }
.progress-fill { height: 100%; background: #f43e5e; border-radius: 2px; width: 0%; transition: width 0.3s; }

.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab { padding: 8px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; border: 1.5px solid #ddd; cursor: pointer; background: #f9fafb; color: #888; }
.tab.active-daily { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
.tab.active-journey { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }

.log-box { font-size: 12px; color: #999; max-height: 160px; overflow-y: auto; line-height: 1.8; }

.preview-img { width: 72px; height: 72px; border-radius: 8px; object-fit: cover; }
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="container" id="main-container">

  <!-- ========== 1. 首次设置页 ========== -->
  <div id="page-setup">
    <div class="card">
      <h1>&#x1F527; 首次设置</h1>
      <p class="subtitle">连接 GitHub 仓库以启用在线发布。<br>Token 获取：GitHub → Settings → Developer settings → Tokens (classic) → Generate new token，勾选 <b>repo</b> 权限。</p>

      <div class="form-group"><label>GitHub 用户名</label><input type="text" id="cfg-user" placeholder="例如：Zn-csh"></div>
      <div class="form-group"><label>仓库名</label><input type="text" id="cfg-repo" placeholder="例如：birthday"></div>
      <div class="form-group"><label>Personal Access Token</label><input type="password" id="cfg-token" placeholder="ghp_xxxxxxxxxxxx"></div>
      <div class="form-group"><label>管理密码</label><input type="password" id="cfg-password" placeholder="设置一个只有你知道的密码"></div>
      <div class="form-group"><label>网站访问密码 <span style="color:#aaa;font-weight:400;">（留空则无需密码）</span></label><input type="password" id="cfg-site-pw" placeholder="让访客输入的密码"></div>

      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
    </div>
  </div>

  <!-- ========== 2. 登录页 ========== -->
  <div id="page-login">
    <div class="card" style="text-align:center;">
      <h1>&#x1F510; 后台管理</h1>
      <p class="subtitle">张楠 & 蔡思晗 · 回忆网站</p>
      <div style="max-width:260px;margin:0 auto;">
        <div class="form-group"><input type="password" id="login-pw" placeholder="请输入管理密码" style="text-align:center;"></div>
        <button class="btn btn-primary" style="width:100%;" onclick="doLogin()">进入后台</button>
        <p class="hint" style="cursor:pointer;" onclick="goSetup()">&#x2699;&#xFE0F; 重新设置</p>
      </div>
    </div>
  </div>

  <!-- ========== 3. 管理面板 ========== -->
  <div id="page-dashboard">
    <div class="header-row">
      <h1>&#x1F4CB; 内容管理</h1>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:12px;color:#999;" id="repo-badge"></span>
        <button class="btn btn-outline btn-sm" onclick="doLogout()">退出</button>
      </div>
    </div>

    <!-- 状态 -->
    <div class="card">
      <div class="status-bar">
        <span class="status-dot idle" id="st-dot"></span>
        <span style="font-size:13px;color:#666;" id="st-text">就绪</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    </div>

    <!-- 密码管理 -->
    <div class="card">
      <h2>&#x1F512; 网站访问密码</h2>
      <div style="display:flex;gap:10px;align-items:flex-end;">
        <div style="flex:1;"><label style="font-size:12px;">密码（留空 = 公开访问）</label><input type="text" id="dash-site-pw" placeholder="当前无密码"></div>
        <button class="btn btn-outline btn-sm" onclick="updateSitePw()">更新密码</button>
      </div>
      <p class="hint" id="site-pw-hint"></p>
    </div>

    <!-- 添加内容 -->
    <div class="card">
      <h2>&#x270F;&#xFE0F; 添加新内容</h2>

      <div class="tabs">
        <button class="tab active-daily" id="tab-daily" onclick="switchTab('daily')">&#x1F4D6; 日常</button>
        <button class="tab" id="tab-journey" onclick="switchTab('journey')">&#x1F9ED; 旅程</button>
      </div>

      <div class="form-row">
        <div class="form-group"><label>文件夹名 *</label><input type="text" id="entry-folder" placeholder="例如：日常5"></div>
        <div class="form-group"><label>标题 *</label><input type="text" id="entry-title" placeholder="例如：珠江新城散步"></div>
      </div>

      <div class="form-row">
        <div class="form-group"><label>日期 *</label><input type="date" id="entry-date"></div>
        <div class="form-group" id="loc-group" style="display:none;"><label>地点</label><input type="text" id="entry-location" placeholder="例如：珠海"></div>
      </div>

      <div class="form-group"><label>描述文字 *</label><textarea id="entry-text" rows="3" placeholder="在这里写下你的感受..."></textarea></div>

      <div class="form-group">
        <label>照片 *（多选）</label>
        <input type="file" id="photo-files" multiple accept="image/*" onchange="previewPhotos()">
        <div id="photo-previews" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;"></div>
        <div id="photo-caps" style="display:none;margin-top:8px;"></div>
      </div>

      <button class="btn btn-primary" id="publish-btn" onclick="doPublish()">&#x1F680; 发布到网站</button>
      <p class="hint">发布后约 30 秒刷新网站即可看到新内容</p>
    </div>

    <!-- 日志 -->
    <div class="card">
      <h2>&#x1F4DD; 操作日志</h2>
      <div class="log-box" id="log-box">就绪，等待操作...</div>
    </div>
  </div>

</div>

<script>
// ============================================
// 存储
// ============================================
var STORE_KEY = 'bday_admin';

function loadCfg() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { return {}; }
}
function saveCfg(obj) {
  localStorage.setItem(STORE_KEY, JSON.stringify(obj));
}

// ============================================
// 页面切换（直接用 style.display）
// ============================================
function showPage(id) {
  var pages = { 'setup': 'page-setup', 'login': 'page-login', 'dashboard': 'page-dashboard' };
  for (var k in pages) {
    var el = document.getElementById(pages[k]);
    if (el) el.style.display = (k === id) ? 'block' : 'none';
  }
}

// ============================================
// 初始化
// ============================================
(function() {
  var c = loadCfg();
  document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];

  if (!c.user || !c.repo || !c.token || !c.password) {
    // 无配置 → 显示设置页
    showPage('setup');
    if (c.user) document.getElementById('cfg-user').value = c.user;
    if (c.repo) document.getElementById('cfg-repo').value = c.repo;
    if (c.token) document.getElementById('cfg-token').value = c.token;
    if (c.password) document.getElementById('cfg-password').value = c.password;
    if (c.sitePassword) document.getElementById('cfg-site-pw').value = c.sitePassword;
  } else {
    // 有配置 → 显示登录页
    showPage('login');
    document.getElementById('repo-badge').textContent = c.user + '/' + c.repo;
  }

  // 回填密码信息
  if (c.sitePassword) {
    document.getElementById('dash-site-pw').value = c.sitePassword;
    document.getElementById('site-pw-hint').textContent = '当前已设置密码保护';
  }
})();

// ============================================
// 设置页：保存配置
// ============================================
function saveConfig() {
  var c = {
    user: document.getElementById('cfg-user').value.trim(),
    repo: document.getElementById('cfg-repo').value.trim(),
    token: document.getElementById('cfg-token').value.trim(),
    password: document.getElementById('cfg-password').value.trim(),
    sitePassword: document.getElementById('cfg-site-pw').value.trim()
  };
  if (!c.user || !c.repo || !c.token || !c.password) {
    showToast('请填写所有必填字段', 'err');
    return;
  }
  saveCfg(c);
  document.getElementById('repo-badge').textContent = c.user + '/' + c.repo;
  if (c.sitePassword) {
    document.getElementById('dash-site-pw').value = c.sitePassword;
    document.getElementById('site-pw-hint').textContent = '当前已设置密码保护';
  }
  showToast('配置已保存', 'ok');
  showPage('login');
}

function goSetup() {
  var c = loadCfg();
  if (c.user) document.getElementById('cfg-user').value = c.user;
  if (c.repo) document.getElementById('cfg-repo').value = c.repo;
  if (c.token) document.getElementById('cfg-token').value = c.token;
  if (c.password) document.getElementById('cfg-password').value = c.password;
  if (c.sitePassword) document.getElementById('cfg-site-pw').value = c.sitePassword;
  showPage('setup');
}

// ============================================
// 登录
// ============================================
function doLogin() {
  if (document.getElementById('login-pw').value === loadCfg().password) {
    showPage('dashboard');
    document.getElementById('repo-badge').textContent = loadCfg().user + '/' + loadCfg().repo;
    var c = loadCfg();
    if (c.sitePassword) {
      document.getElementById('dash-site-pw').value = c.sitePassword;
      document.getElementById('site-pw-hint').textContent = '当前已设置密码保护';
    } else {
      document.getElementById('site-pw-hint').textContent = '当前无密码，网站可公开访问';
    }
  } else {
    showToast('密码错误', 'err');
  }
}

function doLogout() {
  document.getElementById('login-pw').value = '';
  showPage('login');
}

// 回车登录
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('page-login').style.display === 'block') {
    doLogin();
  }
});

// ============================================
// Tab 切换
// ============================================
var currentTab = 'daily';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('loc-group').style.display = (tab === 'journey') ? 'block' : 'none';
  document.getElementById('photo-caps').style.display = (tab === 'journey') ? 'block' : 'none';
  document.getElementById('tab-daily').className = (tab === 'daily') ? 'tab active-daily' : 'tab';
  document.getElementById('tab-journey').className = (tab === 'journey') ? 'tab active-journey' : 'tab';
  rebuildPhotoCaptions();
}

// ============================================
// 照片选择
// ============================================
var selectedFiles = [];

function previewPhotos() {
  selectedFiles = Array.from(document.getElementById('photo-files').files);
  var html = '';
  for (var i = 0; i < selectedFiles.length; i++) {
    html += '<div style="position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;background:#f3f4f6;"><img src="' + URL.createObjectURL(selectedFiles[i]) + '" class="preview-img"><span style="position:absolute;top:2px;right:4px;font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5);">' + (i+1) + '</span></div>';
  }
  document.getElementById('photo-previews').innerHTML = html || '<span style="font-size:12px;color:#999;">未选择照片</span>';
  rebuildPhotoCaptions();
}

function rebuildPhotoCaptions() {
  var container = document.getElementById('photo-caps');
  if (currentTab !== 'journey' || selectedFiles.length === 0) { container.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < selectedFiles.length; i++) {
    html += '<div class="form-group"><label style="font-size:12px;color:#888;">照片 ' + (i+1) + ' 配文（' + selectedFiles[i].name + '）</label><input type="text" class="photo-cap" data-idx="' + i + '" placeholder="给这张照片写一段描述..." style="font-size:13px;"></div>';
  }
  container.innerHTML = html;
}

// ============================================
// GitHub API
// ============================================
function apiBase() {
  var c = loadCfg();
  return 'https://api.github.com/repos/' + c.user + '/' + c.repo;
}

function apiHeaders() {
  return {
    'Authorization': 'Bearer ' + loadCfg().token,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  };
}

async function ghGet(path) {
  var resp = await fetch(apiBase() + '/contents/' + path, { headers: apiHeaders() });
  if (!resp.ok) throw new Error('读取 ' + path + ' 失败: HTTP ' + resp.status);
  return resp.json();
}

async function ghPut(path, contentB64, message, sha) {
  var body = { message: message, content: contentB64 };
  if (sha) body.sha = sha;
  var resp = await fetch(apiBase() + '/contents/' + path, {
    method: 'PUT',
    headers: Object.assign({}, apiHeaders(), { 'Content-Type': 'application/json' }),
    body: JSON.stringify(body)
  });
  if (!resp.ok) {
    var info = await resp.json().catch(function() { return {}; });
    throw new Error('上传 ' + path + ' 失败: HTTP ' + resp.status + ' ' + (info.message || ''));
  }
  return resp.json();
}

function fileToB64(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result.split(',')[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function escJS(str) {
  return str.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n');
}

// ============================================
// 更新网站密码
// ============================================
async function updateSitePw() {
  var newPw = document.getElementById('dash-site-pw').value.trim();
  var c = loadCfg();
  c.sitePassword = newPw;
  saveCfg(c);

  document.getElementById('site-pw-hint').textContent = newPw ? '当前已设置密码保护' : '当前无密码，网站可公开访问';

  try {
    showToast('正在更新远程密码...', 'info');
    var dataFile = await ghGet('data.js');
    var content = atob(dataFile.content);
    content = content.replace(/sitePassword:\s*"[^"]*"/, 'sitePassword: "' + escJS(newPw) + '"');
    var newB64 = btoa(unescape(encodeURIComponent(content)));
    await ghPut('data.js', newB64, '更新网站访问密码', dataFile.sha);
    showToast('密码已更新，30 秒后生效', 'ok');
  } catch(e) {
    showToast('本地已保存，远程同步失败: ' + e.message, 'err');
  }
}

// ============================================
// 发布内容
// ============================================
async function doPublish() {
  var type = currentTab;
  var folder = document.getElementById('entry-folder').value.trim();
  var title = document.getElementById('entry-title').value.trim();
  var date = document.getElementById('entry-date').value;
  var location = document.getElementById('entry-location').value.trim();
  var text = document.getElementById('entry-text').value.trim();

  if (!folder || !title || !date || !text || selectedFiles.length === 0) {
    showToast('请填写所有必填字段并选择至少一张照片', 'err');
    return;
  }

  var btn = document.getElementById('publish-btn');
  btn.disabled = true;
  btn.textContent = '发布中...';
  setStatus('busy', '正在上传...');
  setProgress(0);
  clearLog();

  try {
    var total = selectedFiles.length + 1;
    var done = 0;

    // 1. 上传照片
    var names = [];
    for (var i = 0; i < selectedFiles.length; i++) {
      var safeName = selectedFiles[i].name.replace(/[^a-zA-Z0-9一-鿿\.\-_]/g, '_');
      var path = folder + '/' + safeName;
      var b64 = await fileToB64(selectedFiles[i]);
      addLog('上传: ' + path);
      await ghPut(path, b64, '添加照片: ' + path);
      names.push(safeName);
      done++;
      setProgress(Math.round((done / total) * 100));
    }

    // 2. 读取 data.js
    addLog('读取 data.js...');
    var dataFile = await ghGet('data.js');
    var content = atob(dataFile.content);

    // 3. 生成新条目
    var newEntry;
    if (type === 'daily') {
      newEntry = '\n    {\n      folder: "' + folder + '",\n      title: "' + title + '",\n      date: "' + date + '",\n      text: "' + escJS(text) + '",\n      photos: [' + names.map(function(n) { return '"' + n + '"'; }).join(', ') + ']\n    },';
    } else {
      var capInputs = document.querySelectorAll('.photo-cap');
      var caps = [];
      capInputs.forEach(function(inp) {
        var v = inp.value.trim();
        if (v) caps.push({ idx: parseInt(inp.dataset.idx), cap: v });
      });
      var items = names.map(function(name, i) {
        var cap = caps.find(function(c) { return c.idx === i; });
        if (cap) return '{ file: "' + name + '", caption: "' + escJS(cap.cap) + '" }';
        return '"' + name + '"';
      });
      newEntry = '\n    {\n      folder: "' + folder + '",\n      title: "' + title + '",\n      location: "' + location + '",\n      date: "' + date + '",\n      text: "' + escJS(text) + '",\n      photos: [' + items.join(', ') + ']\n    },';
    }

    // 4. 插入新条目
    var arrayKey = type === 'daily' ? 'daily' : 'journeys';
    var marker = arrayKey + ': [';
    var start = content.indexOf(marker);
    if (start === -1) throw new Error('找不到 ' + arrayKey + ' 数组');

    var depth = 0, insertPos = -1, inArr = false;
    for (var j = start; j < content.length; j++) {
      if (content[j] === '[') { depth++; inArr = true; }
      else if (content[j] === ']') { depth--; if (inArr && depth === 0) { insertPos = j; break; } }
    }
    if (insertPos === -1) throw new Error('无法解析 ' + arrayKey + ' 数组');

    var newContent = content.substring(0, insertPos) + newEntry + '\n  ' + content.substring(insertPos);
    var newB64 = btoa(unescape(encodeURIComponent(newContent)));
    addLog('更新 data.js');

    await ghPut('data.js', newB64, '添加' + (type === 'daily' ? '日常' : '旅程') + ': ' + title, dataFile.sha);
    done++;
    setProgress(100);
    setStatus('ok', '发布成功！');
    addLog('全部完成！约 30 秒后刷新网站可见');
    showToast('发布成功！', 'ok');

    // 重置表单
    document.getElementById('entry-folder').value = '';
    document.getElementById('entry-title').value = '';
    document.getElementById('entry-text').value = '';
    document.getElementById('entry-location').value = '';
    document.getElementById('photo-files').value = '';
    document.getElementById('photo-previews').innerHTML = '';
    document.getElementById('photo-caps').innerHTML = '';
    selectedFiles = [];
  } catch(e) {
    setStatus('err', '失败: ' + e.message);
    addLog('错误: ' + e.message);
    showToast('发布失败: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '发布到网站';
  }
}

// ============================================
// 状态栏 / 日志 / Toast
// ============================================
function setStatus(state, text) {
  var dot = document.getElementById('st-dot');
  dot.className = 'status-dot ' + state;
  document.getElementById('st-text').textContent = text;
}
function setProgress(pct) {
  document.getElementById('prog-fill').style.width = pct + '%';
}
function addLog(msg) {
  var box = document.getElementById('log-box');
  if (box.textContent === '就绪，等待操作...') box.textContent = '';
  box.textContent += '[' + new Date().toLocaleTimeString() + '] ' + msg + '\n';
  box.scrollTop = box.scrollHeight;
}
function clearLog() {
  document.getElementById('log-box').textContent = '';
}
function showToast(msg, type) {
  var old = document.querySelector('.toast');
  if (old) old.remove();
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}
</script>

</body>
</html>
